networks:
  travel-network:
    driver: bridge

services:
  react-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_HOST=0.0.0.0
      - NODE_ENV=development
      - BROWSER=none
    depends_on:
      - node-app

  node-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=127.0.0.1
      - DB_USER=root
      - DB_PASSWORD=GHKDwjddn
      - DB_PORT=3306
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=GHKDwjddn
      - MYSQL_DATABASE=Travel
    networks:
      - travel-network

